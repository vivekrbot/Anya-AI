<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anya AI — Settings</title>
  <link rel="stylesheet" href="options.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>
  <div class="container">
    <header class="header">
      <svg class="logo-icon" viewBox="0 0 40 40" width="32" height="32">
        <circle cx="20" cy="20" r="20" fill="#00BFA5"/>
        <path d="M20 8c-2 0-4 1-5.5 2.5C13 12 12 14.5 12 17c0 4 2.5 7 6 8.5v3c0 .8.3 1.5.8 2 .5.5 1.2.8 2 .8h.4c.8 0 1.5-.3 2-.8.5-.5.8-1.2.8-2v-3c3.5-1.5 6-4.5 6-8.5 0-2.5-1-5-2.5-6.5C26 9 24 8 22 8h-2z" fill="white" opacity="0.9"/>
        <circle cx="16.5" cy="16" r="2" fill="#00BFA5"/>
        <circle cx="23.5" cy="16" r="2" fill="#00BFA5"/>
      </svg>
      <h1>Anya AI Settings</h1>
    </header>

    <!-- API Key Section -->
    <section class="card">
      <h2>API Configuration</h2>
      <div class="field">
        <label for="apiKey">Groq API Key</label>
        <div class="input-row">
          <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off">
          <button id="btnToggleKey" class="icon-btn" title="Show/hide key">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>
      <div class="button-row">
        <button id="btnSaveKey" class="btn btn-primary">Save Key</button>
        <button id="btnTestKey" class="btn btn-secondary">Test Key</button>
      </div>
      <div id="keyStatus" class="status hidden"></div>
    </section>

    <!-- Model & Defaults -->
    <section class="card">
      <h2>Model & Defaults</h2>
      <div class="field">
        <label for="model">Default Model</label>
        <select id="model"></select>
      </div>
      <div class="field">
        <label for="temperature">Temperature: <span id="tempValue">0.7</span></label>
        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
      </div>
      <div class="field">
        <label for="responseLength">Response Length</label>
        <select id="responseLength">
          <option value="short">Short</option>
          <option value="medium">Medium</option>
          <option value="long">Long</option>
        </select>
      </div>
      <div class="field">
        <label for="defaultTone">Default Tone</label>
        <select id="defaultTone">
          <option value="professional">Professional</option>
          <option value="friendly">Friendly</option>
          <option value="direct">Direct</option>
        </select>
      </div>
      <button id="btnSaveSettings" class="btn btn-primary">Save Settings</button>
      <div id="settingsStatus" class="status hidden"></div>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
